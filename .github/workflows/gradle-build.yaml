name: Gradle

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'microsoft'
          java-version: '17'
      - name: Cache Gradle packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - name: Cache Kotlin Native
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-konan-
      - name: Build with Gradle
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            ./gradlew --no-daemon linkReleaseExecutableLinuxX64 linuxX64Test
            cp build/bin/linuxX64/releaseExecutable/kotwords.kexe kotwords-cli-linux
          elif [ "$RUNNER_OS" == "macOS" ]; then
            ./gradlew --no-daemon jvmJar jsBrowserDistribution linkReleaseExecutableMacosX64 jvmTest jsTest macosX64Test
            cp build/bin/macosX64/releaseExecutable/kotwords.kexe kotwords-cli-mac
          elif [ "$RUNNER_OS" == "Windows" ]; then
            ./gradlew --no-daemon linkReleaseExecutableMingwX64 mingwX64Test
            cp build/bin/mingwX64/releaseExecutable/kotwords.exe kotwords-cli-windows.exe
          else
            echo "Unknown OS: $RUNNER_OS"
            exit 1
          fi
        shell: bash
      - name: Publish snapshot
        if: runner.os == 'macOS'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.OSSRH_DEPLOY_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.OSSRH_DEPLOY_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.PGP_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.PGP_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.PGP_PASSPHRASE }}
        run: ./publish-snapshot.sh
      - name: Upload GitHub Pages artifact
        if: runner.os == 'macOS'
        id: deployment
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/dist/js/productionExecutable/
      - name: Archive distributed artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kotwords-build-${{ runner.os }}
          path: kotwords-cli-*
          archive: false
      - name: Upload to GitHub Release
        # Only run this step for tagged releases
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} kotwords-cli-* --clobber

  deploy:
    if: github.repository == 'jpd236/kotwords' && github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
